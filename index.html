<!DOCTYPE html>
<html lang = "en"

<head>
	<title>VibeCheck</title>
	<style>
		body{
			background-color: #0d0d12;;
			color: white;
			font-family: Arial, sans-serif;
			text-align: center;
			padding: 40px;
		}
		
		h1 {
			font-size: 48px;
			margin-bottom: 10px;
		}

		p{
			color: #888aa;
			font-size: 18px;
		}

		button{
			background-color: #1e1e2a;
			color: white;
			border: 2px solid #2e2e3e;
			padding: 15px 25px;
			margin: 8px;
			font-size: 16px;
			border-radius: 12px;
			cursor: pointer;
		}

		button:hover{
			background-color: #2e2e3e;
			border-color: white;
		}

		#song-list {
      			margin-top: 40px;
      			background-color: #1e1e2a;
      			border: 1px solid #2e2e3e;
      			border-radius: 16px;
      			padding: 30px;
      			max-width: 500px;
      			margin-left: auto;
     			margin-right: auto;
   		}
	</style>
</head>


<body>
	<h1>&#127925;VibeCheck</h1>
	<p>Pick your mood. Get your soundtrack.</p>
	<p>How are you feeling?</p>
	<div>
		<button onclick = "showSongs('happy')">&#128516; Happy</button>
		<button onclick = "showSongs('sad')">&#128546; Sad</button>
		<button onclick = "showSongs('chill')">&#128524; Chill</button>
		<button onclick = "showSongs('hype')">&#128293; Hype</button>
		<button onclick = "showongs('focus')">&#129504; Focus</button>
		<button onclick = "showSongs('angry')">&#128548; Angry</button>
	</div>

	<div id = "song-list">
		<p>Click a mood above to see songs!</p>
	</div>

	<script>
		function showSongs(mood) {
			var songs = {

        			happy: ["Can't Stop the Feeling - Justin Timberlake", "Levitating - Dua Lipa", "Happy - Pharrell Williams"],

        			sad:   ["Someone Like You - Adele", "Fix You - Coldplay", "Skinny Love - Bon Iver"],

        			chill: ["Sunset Lover - Petit Biscuit", "Electric Feel - MGMT", "coffee - beabadoobee"],

        			hype:  ["HUMBLE. - Kendrick Lamar", "Lose Yourself - Eminem", "Thunder - Imagine Dragons"],

        			focus: ["Experience - Ludovico Einaudi", "Time - Hans Zimmer", "Strobe - Deadmau5"],

        			angry: ["Killing in the Name - RATM", "Given Up - Linkin Park", "Duality - Slipknot"]

      			};


      			var list = songs[mood];

      			var box = document.getElementById("song-list");


      			box.innerHTML = "<h2>Songs for you:</h2>";


     	 		for (var i = 0; i < list.length; i++) {

        			box.innerHTML = box.innerHTML + "<p>" + list[i] + "</p>";

      			}


    		}
	</script>
</body>

</html>
